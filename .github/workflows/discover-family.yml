name: Discover family
# ─────────────────────────────────────────────────────────────────────
# Daily auto-discovery of the chirag127/* family inventory.
# - 01:00 UTC == 06:30 IST, aligned with env-sync cadence
# - On diff: commits regenerated src/family-data.ts, bumps minor
#   version, publishes to npm so consumers receive a Renovate PR.
# - Other chirag127 repos can trigger this via repository_dispatch
#   (event_type: family-changed) on repo create/rename/archive.
# ─────────────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [family-changed]

permissions:
  contents: write
  id-token: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ADMIN_PAT }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with: { version: 10 }

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install deps
        run: pnpm install --frozen-lockfile=false

      - name: Authenticate gh CLI
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_PAT }}
        run: gh auth status

      - name: Run discovery
        id: discover
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          node scripts/discover-family.mjs
          if git diff --quiet src/family-data.ts; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff src/family-data.ts | head -200
          fi

      - name: Configure git
        if: steps.discover.outputs.changed == 'true'
        run: |
          git config user.name 'chirag127-bot'
          git config user.email 'bot@oriz.in'

      - name: Bump version + commit
        if: steps.discover.outputs.changed == 'true'
        run: |
          pnpm version minor --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "Bumped to $NEW_VERSION"
          git add package.json src/family-data.ts
          git commit -m "chore(family-data): auto-refresh $NEW_VERSION"
          git tag "v$NEW_VERSION"
          git push origin HEAD --tags

      - name: Publish to npm
        if: steps.discover.outputs.changed == 'true'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
